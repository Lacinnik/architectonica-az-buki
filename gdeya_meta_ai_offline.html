var BUKI = [{"id": "B1", "symbol": "⊕", "title": "Суперпозиция"}, {"id": "B2", "symbol": "∅", "title": "Пустота"}, {"id": "B3", "symbol": "τ", "title": "Пластичность времени"}, {"id": "B4", "symbol": "Ψ", "title": "Волновая форма"}, {"id": "B5", "symbol": "C^{⊕}", "title": "⊕-Капитал"}, {"id": "B6", "symbol": "Σ", "title": "Сумма резонансов"}, {"id": "B7", "symbol": "φ", "title": "Фаза пробуждения"}, {"id": "B8", "symbol": "R_f", "title": "Резонанс с будущим"}, {"id": "B9", "symbol": "∇", "title": "Градиент"}, {"id": "B10", "symbol": "I_{Я}", "title": "Интеграция ядра"}, {"id": "B11", "symbol": "⊗", "title": "Точка кристаллизации"}, {"id": "B12", "symbol": "F_s", "title": "Поток смысла"}, {"id": "B13", "symbol": "λ", "title": "Длина волны"}, {"id": "B14", "symbol": "A", "title": "Амплитуда переживания"}, {"id": "B15", "symbol": "∆S", "title": "Изменение смысла"}, {"id": "B16", "symbol": "Q", "title": "Качество отклика"}, {"id": "B17", "symbol": "T", "title": "Текучесть"}, {"id": "B18", "symbol": "S_f", "title": "Структурная форма"}, {"id": "B19", "symbol": "C_m", "title": "Контейнер смыслов"}, {"id": "B20", "symbol": "E^{⊕}", "title": "Энтропическая энергия"}, {"id": "B21", "symbol": "α", "title": "Коэффициент соответствия"}, {"id": "B22", "symbol": "k", "title": "Плотность восприятия"}, {"id": "B23", "symbol": "ω", "title": "Частота обновления"}, {"id": "B24", "symbol": "⊕(Σ)", "title": "Суперпозиция систем"}];
var TX = [{"id": "TX1", "title": "Ядро"}, {"id": "TX2", "title": "Орбита"}, {"id": "TX3", "title": "Резонанс"}, {"id": "TX4", "title": "Мост"}, {"id": "TX5", "title": "Материализация"}, {"id": "TX6", "title": "Интеграция"}, {"id": "TX7", "title": "Перезапуск"}];

// ===== State =====
var SEQ = ["РЕСУРС","ВЛАСТЬ","ОТНОШЕНИЯ","РЕЗУЛЬТАТ"];
var plateIdx = 0;
var currentCard = null;
var convo = []; // {role:'ai'|'me', text:string}
var chosen = { az:null, buka:null, tx:null };
var needN = 0;
var namedStates = [];

// ===== Helpers =====
function shuffle(a){ var r=a.slice(); for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)); var t=r[i]; r[i]=r[j]; r[j]=t;} return r; }
function addMsg(role, text){
  convo.push({role:role,text:text});
  var log = document.getElementById("log");
  var div = document.createElement("div");
  div.className = "msg " + (role==='ai'?'ai':'me');
  div.innerHTML = text.replace(/\n/g,"<br>");
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
function fmtCard(c){ return c.process + " · " + c.roman + " · N=" + c.arabic; }
function drawCard(){
  var plate = SEQ[plateIdx];
  var pool = [];
  for (var i=0;i<CARDS_96.length;i++){ if (CARDS_96[i].plate===plate) pool.push(CARDS_96[i]); }
  currentCard = shuffle(pool)[0];
  needN = currentCard.arabic;
  namedStates = [];
  document.getElementById("plate").textContent = plate;
  document.getElementById("card").textContent = fmtCard(currentCard);
  chosen.az = null; chosen.buka = null; chosen.tx = null;
  renderSelections();
  addMsg('ai', "Плита: <b>"+plate+"</b>. Карта: <b>"+currentCard.process+"</b> (фаза I–IV: <b>"+currentCard.roman+"</b>, состояний: <b>"+needN+"</b>).<br>Назови <b>"+needN+"</b> своих живых состояния — по одному в строке или через запятую. Затем выбери <b>Аз</b>, <b>Буку</b> и <b>Передачу</b> справа. Когда всё готово — скажи: <i>«Готов»</i>.");
}
function ensureDrawn(){
  if (!currentCard){ drawCard(); }
}

// ===== Right panel =====
function renderSelections(){
  var azL = document.getElementById("az-list"), h="";
  for (var i=0;i<AZ.length;i++){ h += '<button class="btn small" onclick="pickAz(\''+AZ[i].id+'\')">'+AZ[i].title+'</button>'; }
  azL.innerHTML = h;
  document.getElementById("az-chosen").textContent = chosen.az ? ("Выбрано: " + chosen.az.title) : "";

  var bL = document.getElementById("buka-list"); h="";
  for (var j=0;j<BUKI.length;j++){ h += '<button class="btn small" onclick="pickBuka(\''+BUKI[j].id+'\')">'+BUKI[j].symbol+' '+BUKI[j].title+'</button>'; }
  bL.innerHTML = h;
  document.getElementById("buka-chosen").textContent = chosen.buka ? ("Выбрано: " + chosen.buka.symbol + " " + chosen.buka.title) : "";

  var tL = document.getElementById("tx-list"); h="";
  for (var k=0;k<TX.length;k++){
    var sel = (chosen.tx && chosen.tx.id===TX[k].id) ? ' style="background:rgba(250,204,21,.2)"' : "";
    h += '<button class="btn small" onclick="pickTx(\''+TX[k].id+'\')"'+sel+'>'+TX[k].title+'</button>';
  }
  tL.innerHTML = h;
  document.getElementById("tx-chosen").textContent = chosen.tx ? ("Выбрано: " + chosen.tx.title) : "";
}
function byId(list,id){ for (var i=0;i<list.length;i++){ if(list[i].id===id) return list[i]; } return null; }
function pickAz(id){ chosen.az = byId(AZ,id); renderSelections(); }
function pickBuka(id){ chosen.buka = byId(BUKI,id); renderSelections(); }
function pickTx(id){ chosen.tx = byId(TX,id); renderSelections(); }

// ===== Conversation logic =====
function handleUser(text){
  addMsg('me', text);
  ensureDrawn();

  // Если пользователь перечисляет состояния
  var list = text.split(/[,
;]/);
  var added = 0;
  for (var i=0;i<list.length;i++){
    var s = list[i].trim();
    if (!s) continue;
    if (namedStates.length < needN){
      namedStates.push(s);
      added++;
    }
  }
  if (added>0){
    addMsg('ai', "Записал состояний: <b>"+namedStates.length+"</b> из <b>"+needN+"</b>.");
  }

  // Готовность
  if (/^готов[.!?]*$/i.test(text.trim())){
    var ok = (namedStates.length===needN && chosen.az && chosen.buka && chosen.tx);
    if (!ok){
      var lacks = [];
      if (namedStates.length!==needN) lacks.push("состояния ("+namedStates.length+"/"+needN+")");
      if (!chosen.az) lacks.push("Аз");
      if (!chosen.buka) lacks.push("Бука");
      if (!chosen.tx) lacks.push("Передача");
      addMsg('ai', "Ещё не хватает: <b>"+lacks.join(", ")+"</b>.");
      return;
    }
    // Резонансная формула
    var report = [
      "Карта: <b>"+currentCard.process+"</b> · фаза <b>"+currentCard.roman+"</b> · N="+needN,
      "Формула: <b>"+chosen.az.title+"</b> × <b>"+chosen.buka.symbol+" "+chosen.buka.title+"</b> → <b>"+chosen.tx.title+"</b>",
      "Твои состояния: " + namedStates.map(function(s){return "<span class='chip'>"+s+"</span>";}).join(" ")
    ].join("<br>");
    addMsg('ai', report + "<br>Когда будешь готов — нажми «Вытянуть карту», мы пойдём дальше. Если хочешь — можешь проговорить, что поменялось внутри.");
    // Автоматический переход плиты после 6 карт? В мета-версии оставим ручным по кнопке.
    return;
  }

  // Иначе — содержательный отклик
  var hint = "Двигайся просто: назови ещё состояния или скажи <i>«Готов»</i>.";
  addMsg('ai', "Слышу тебя. Это отражается в текущем процессе: <b>"+currentCard.process+"</b>. "+hint);
}

function sendInput(){
  var el = document.getElementById("inp");
  var txt = el.value; if (!txt.trim()) return;
  el.value = "";
  handleUser(txt);
}

function exportDialog(){
  var lines = [];
  for (var i=0;i<convo.length;i++){
    lines.push((convo[i].role==='ai'?'AI: ':'Я: ') + convo[i].text.replace(/<[^>]+>/g,''));
  }
  var blob = new Blob([lines.join("\n")], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'gdeya_meta_dialog.txt'; a.click();
  URL.revokeObjectURL(url);
}

// ===== Wire =====
function init(){
  addMsg('ai', "Я с тобой. Когда будешь готов — нажми «Вытянуть карту» или скажи, что откликается.");
  document.getElementById("send").addEventListener("click", sendInput);
  document.getElementById("inp").addEventListener("keydown", function(e){ if(e.key==='Enter'){ e.preventDefault(); sendInput(); }});
  document.getElementById("btn-draw").addEventListener("click", function(){
    drawCard();
  });
  document.getElementById("btn-export").addEventListener("click", exportDialog);
  // правую панель сразу покажем
  renderSelections();
}
if (document.readyState==='loading'){ document.addEventListener('DOMContentLoaded', init); } else { init(); }
</script>
